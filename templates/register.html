{% extends "base.html" %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center relative z-10">
    <div class="absolute inset-0 z-0">
        <img src="https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80" alt="Background" class="w-full h-full object-cover opacity-20 rounded-3xl" />
        <div class="absolute inset-0 bg-gradient-to-br from-indigo-500/30 to-pink-500/30 rounded-3xl mix-blend-multiply"></div>
    </div>
    
    <div class="glass max-w-md w-full rounded-2xl p-8 relative z-10 shadow-2xl backdrop-blur-xl border border-white/40">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-gray-900">Create an Account</h2>
            <p class="text-gray-600 mt-2">Join TravelMind AI to start planning.</p>
        </div>
        
        <form action="{{ url_for('auth.register') }}" method="POST" class="space-y-5">
            <div>
                <label for="fullname" class="block text-sm font-medium text-gray-700">Full Name</label>
                <div class="mt-1 relative rounded-md shadow-sm">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-regular fa-user text-gray-400"></i>
                    </div>
                    <input type="text" name="fullname" id="fullname" class="focus:ring-primary focus:border-primary block w-full pl-10 sm:text-sm border-gray-300 rounded-xl py-3 px-4 bg-white/70 backdrop-blur-sm border" required>
                </div>
            </div>
            
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
                <div class="mt-1 relative rounded-md shadow-sm">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-regular fa-envelope text-gray-400"></i>
                    </div>
                    <input type="email" name="email" id="email" class="focus:ring-primary focus:border-primary block w-full pl-10 sm:text-sm border-gray-300 rounded-xl py-3 px-4 bg-white/70 backdrop-blur-sm border" required>
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                <div class="mt-1 relative rounded-md shadow-sm">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-gray-400"></i>
                    </div>
                    <input type="password" name="password" id="password" class="focus:ring-primary focus:border-primary block w-full pl-10 sm:text-sm border-gray-300 rounded-xl py-3 px-4 bg-white/70 backdrop-blur-sm border" required>
                </div>
            </div>

            <div>
                <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-gradient-to-r from-primary to-indigo-600 hover:from-indigo-600 hover:to-primary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all">
                    Sign Up
                </button>
            </div>
        </form>
        
        <div class="mt-6 text-center">
            <p class="text-sm text-gray-600">
                Already have an account? 
                <a href="{{ url_for('auth.login') }}" class="font-medium text-primary hover:text-indigo-500">Log in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
