{% extends "base.html" %}

{% block content %}
<div class="py-6 max-w-3xl mx-auto">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="h-32 bg-gradient-to-r from-primary to-secondary relative"></div>
        
        <div class="px-8 pb-8 relative">
            <div class="w-24 h-24 bg-white rounded-full p-1 absolute -top-12 border border-gray-200 shadow-sm flex items-center justify-center">
                <div class="w-full h-full bg-gray-100 rounded-full flex items-center justify-center text-4xl text-gray-400">
                    <i class="fa-regular fa-user"></i>
                </div>
            </div>
            
            <div class="pt-16">
                <h1 class="text-2xl font-bold text-gray-900">{{ current_user.fullname }}</h1>
                <p class="text-gray-500">{{ current_user.email }}</p>
                <p class="text-sm text-gray-400 mt-1">Member since {{ current_user.created_at.strftime('%B %Y') }}</p>
            </div>
            
            <div class="mt-8 pt-8 border-t border-gray-100">
                <h3 class="font-bold text-gray-900 mb-4">Travel Preferences</h3>
                
                <form class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Preferred Language</label>
                            <select class="w-full border-gray-300 rounded-xl focus:ring-primary focus:border-primary px-4 py-2 border bg-gray-50">
                                <option {% if current_user.preferred_language == 'English' %}selected{% endif %}>English</option>
                                <option {% if current_user.preferred_language == 'Hindi' %}selected{% endif %}>Hindi</option>
                                <option {% if current_user.preferred_language == 'Spanish' %}selected{% endif %}>Spanish</option>
                                <option {% if current_user.preferred_language == 'French' %}selected{% endif %}>French</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Default Travel Style</label>
                            <select class="w-full border-gray-300 rounded-xl focus:ring-primary focus:border-primary px-4 py-2 border bg-gray-50">
                                <option {% if current_user.travel_style == 'Budget' %}selected{% endif %}>Budget / Backpacker</option>
                                <option {% if current_user.travel_style == 'Balanced' %}selected{% endif %}>Balanced / Comfort</option>
                                <option {% if current_user.travel_style == 'Luxury' %}selected{% endif %}>Luxury</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="flex justify-end">
                        <button type="button" class="bg-primary hover:bg-indigo-700 text-white px-6 py-2 rounded-xl font-medium shadow transition-all">
                            Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
